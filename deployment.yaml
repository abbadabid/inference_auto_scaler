apiVersion: apps/v1
kind: Deployment
metadata:
  name: resnet-deployment
  labels:
    app: resnet 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet
  template:
    metadata:
      labels:
        app: resnet
    spec:
      containers:
      - name: resnet
        image: abbad470/resnet:latest
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "1"
          limits:
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: resnet-service
spec:
  type: NodePort
  selector:
    app: resnet
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
      nodePort: 30000