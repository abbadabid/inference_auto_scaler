apiVersion: apps/v1
kind: Deployment
metadata:
  name: resnet-deployment
  labels:
    app: resnet 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet
  template:
    metadata:
      labels:
        app: resnet
    spec:
      containers:
      - name: resnet
        image: abbad470/resnet:latest
        ports:
        - containerPort: 8001
        resources:
          requests:
            cpu: "1"
          limits:
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: resnet-service
spec:
  type: ClusterIP      
  selector:
    app: resnet
  ports:
    - protocol: TCP
      port: 8001
      targetPort: 8001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatcher-deployment
  labels:
    app: dispatcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatcher
  template:
    metadata:
      labels:
        app: dispatcher
    spec:
      containers:
      - name: dispatcher
        image: abbad470/dispatcher:latest
        ports:
        - name: http
          containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: dispatcher-service
  labels:
    app: dispatcher
spec:
  type: NodePort
  selector:
    app: dispatcher
  ports:
    - name: http        
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoscaler-deployment
  labels:
    app: autoscaler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autoscaler
  template:
    metadata:
      labels:
        app: autoscaler
    spec:
      serviceAccountName: autoscaler-sa  
      containers:
      - name: autoscaler
        image: abbad470/autoscaler:latest